[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm --filter @oneul-yajang/api build"

[deploy]
startCommand = "npm install -g pnpm@9.15.0 && pnpm --filter @oneul-yajang/api migrate && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
